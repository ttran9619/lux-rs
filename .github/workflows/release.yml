name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: reflection-puzzler-linux-x86_64.tar.gz
            bin_name: reflection-puzzler
            bin_suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: reflection-puzzler-macos-x86_64.tar.gz
            bin_name: reflection-puzzler
            bin_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: reflection-puzzler-windows-x86_64.zip
            bin_name: reflection-puzzler
            bin_suffix: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/reflection-puzzler | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.bin_name }}${{ matrix.bin_suffix }} dist/reflection-puzzler/
          Copy-Item assets dist/reflection-puzzler/ -Recurse
          Compress-Archive -Path dist/reflection-puzzler/* -DestinationPath dist/${{ matrix.archive_name }} -Force

      - name: Create release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/reflection-puzzler
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} dist/reflection-puzzler/
          cp -r assets dist/reflection-puzzler/
          tar -czf dist/${{ matrix.archive_name }} -C dist reflection-puzzler

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
